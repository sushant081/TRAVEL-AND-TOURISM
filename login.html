<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Travel Website</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(90deg, #1a1a1a 50%, #9d1871 50%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(157, 24, 113, 0.37);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 40px 35px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      font-family: 'Brush Script MT', cursive;
      font-size: 2.5rem;
      color: #f8b400;
      text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.7);
    }

    .input-group {
      position: relative;
      width: 100%;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255, 255, 255, 0.4);
      font-size: 1.1rem;
      color: #ee1b1b;
      outline: none;
      transition: border-color 0.3s ease;
    }

    input::placeholder {
      color: transparent;
    }

    label {
      position: absolute;
      left: 16px;
      top: 16px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -10px;
      left: 12px;
      font-size: 0.8rem;
      color: #f8b400;
      font-weight: 600;
    }

    input:focus {
      border-bottom: 2px solid #f8b400;
    }

    button {
      background: linear-gradient(135deg, #f8b400, #d67c00);
      border: none;
      padding: 14px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #4b3b00;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.4s ease, transform 0.2s ease;
      box-shadow: 0 4px 15px rgba(248, 180, 0, 0.7);
    }

    button:hover {
      background: linear-gradient(135deg, #d67c00, #f8b400);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .signup-text {
      text-align: center;
      font-size: 0.9rem;
      color: #f8b400;
    }

    .signup-text a {
      color: #f8b400;
      font-weight: bold;
      text-decoration: none;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Welcome, Let's Travel with Sushant</h2>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required />
        <label for="email">Email</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required />
        <label for="password">Password</label>
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="signup-text">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (email && password) {
        alert("Login successful! (Demo only — no backend)");
        // You can simulate redirect here
          window.location.href = 'index.html';
      } else {
        alert("Please fill out both fields.");
      }
    }
  </script>

</body>
</html>
