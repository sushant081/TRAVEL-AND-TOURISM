<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signup | Travel with Sushant</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(90deg, #9d1871 50%, #1a1a1a 50%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signup-container {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(157, 24, 113, 0.37);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 40px 35px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    h2 {
      text-align: center;
      font-family: 'Brush Script MT', cursive;
      font-size: 2.5rem;
      color: #f8b400;
    }

    .input-group {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255, 255, 255, 0.4);
      font-size: 1.1rem;
      color: #f8b400;
      outline: none;
    }

    label {
      position: absolute;
      left: 16px;
      top: 16px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      transition: 0.3s ease;
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -10px;
      left: 12px;
      font-size: 0.8rem;
      color: #f8b400;
      font-weight: 600;
    }

    button {
      background: linear-gradient(135deg, #f8b400, #d67c00);
      border: none;
      padding: 14px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #4b3b00;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.4s ease, transform 0.2s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #d67c00, #f8b400);
      transform: scale(1.05);
    }

    .login-text {
      text-align: center;
      font-size: 0.9rem;
      color: #f8b400;
    }

    .login-text a {
      color: #f8b400;
      font-weight: bold;
      text-decoration: none;
    }

    .login-text a:hover {
      text-decoration: underline;
    }

    .message {
      text-align: center;
      font-size: 0.95rem;
      color: lightgreen;
      height: 20px;
    }

    .message.error {
      color: red;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <h2>Sign Up to Travel with Sushant</h2>

    <form id="signupForm">
      <div class="input-group">
        <input type="text" id="name" placeholder="Name" required />
        <label for="name">Name</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required />
        <label for="email">Email</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required />
        <label for="password">Password</label>
      </div>

      <button type="submit">Sign Up</button>
    </form>

    <div class="message" id="signupMessage"></div>

    <div class="login-text">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const signupMessage = document.getElementById('signupMessage');

    signupForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      fetch('http://localhost:3000/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("Signup failed");
        }
        return response.json();
      })
      .then(data => {
        signupMessage.textContent = "Signup successful! Redirecting to login...";
        signupMessage.classList.remove("error");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      })
      .catch(error => {
        signupMessage.textContent = error.message || "Something went wrong!";
        signupMessage.classList.add("error");
      });
    });
  </script>

</body>
</html>
